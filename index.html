<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body class="bg-slate-50 font-['Manrope'] min-h-screen">

    <section id="login-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-12 rounded-xl shadow-sm w-full max-w-[500px] text-center border border-gray-100">
            <div class="flex justify-center mb-6">
                <i class="fa-brands fa-github text-8xl text-slate-800"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-1">GitHub Issues Tracker</h1>
            <p class="text-slate-400 text-sm mb-10 font-medium">Sign in to manage your issues</p>
            
            <form id="login-form" class="space-y-6 text-left">
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text font-bold text-slate-700">Username</span></label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full h-12 bg-white" required />
                    <span class="text-[12px] text-indigo-600 font-medium mt-1">Default: admin</span>
                </div>
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text font-bold text-slate-700">Password</span></label>
                    <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full h-12 bg-white" required />
                    <span class="text-[12px] text-indigo-600 font-medium mt-1">Default: admin123</span>
                </div>
                <button type="submit" class="btn btn-primary w-full bg-[#4F46E5] border-none hover:bg-indigo-700 text-white font-bold h-12 rounded-lg mt-4">Sign In</button>
            </form>

            <div class="divider text-slate-300 my-8">OR</div>
            <div class="bg-slate-50 p-6 rounded-lg text-left">
                <p class="text-[12px] text-slate-400 font-bold uppercase tracking-widest mb-3 text-center">Demo Credentials:</p>
                <div class="flex flex-col items-center">
                    <p class="text-sm font-bold text-slate-700">Username: <span class="font-normal">admin</span></p>
                    <p class="text-sm font-bold text-slate-700">Password: <span class="font-normal">admin123</span></p>
                </div>
            </div>
        </div>
    </section>

    <main id="main-content" class="hidden">
<header class="navbar bg-white shadow-sm px-6 lg:px-16 border-b border-slate-200 h-20">
    <div class="flex-1">
        <a class="text-xl font-black text-slate-800 flex items-center gap-3 cursor-pointer">
            <i class="fa-brands fa-github text-2xl"></i> GitHub Issues Tracker
        </a>
    </div>

    <div class="flex-none flex items-center gap-4">
        <div class="relative flex items-center">
            <span class="absolute left-3 text-slate-400 z-10">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input 
                id="search-input" 
                type="text" 
                placeholder="Search issues..." 
                class="input input-bordered w-64 md:w-80 h-10 pl-10 focus:border-indigo-500 bg-white text-slate-700 placeholder:text-slate-400" 
            />
        </div>
        
        <button class="btn btn-primary bg-[#4F46E5] border-none hover:bg-indigo-700 text-white font-bold rounded-lg px-6 h-10">
            + New Issue
        </button>
    </div>
</header>
        <div class="container mx-auto py-10 px-6">
            <div class="flex justify-center gap-2 mb-10 bg-slate-100 p-1.5 rounded-xl w-fit mx-auto border border-slate-200">
                <button onclick="filterIssues('all')" id="tab-all" class="tab-btn px-10 py-2.5 rounded-lg text-sm font-bold transition-all bg-[#4F46E5] text-white">All</button>
                <button onclick="filterIssues('open')" id="tab-open" class="tab-btn px-10 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:bg-white">Open</button>
                <button onclick="filterIssues('closed')" id="tab-closed" class="tab-btn px-10 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:bg-white">Closed</button>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-gray-100 flex items-center justify-between mb-8 shadow-sm max-w-7xl mx-auto">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-50 p-4 rounded-2xl text-indigo-600">
                        <i class="fa-solid fa-dharmachakra text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-slate-800"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-sm text-slate-400 font-medium">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-6 text-[11px] font-black uppercase tracking-widest">
                    <span class="text-emerald-500 flex items-center gap-2 font-bold"><i class="fa-solid fa-circle text-[8px]"></i> Open</span>
                    <span class="text-purple-500 flex items-center gap-2 font-bold"><i class="fa-solid fa-circle text-[8px]"></i> Closed</span>
                </div>
            </div>

            <div id="loader" class="flex justify-center my-20 hidden">
                <span class="loading loading-spinner loading-lg text-indigo-600"></span>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
                </div>
        </div>
    </main>

    <input type="checkbox" id="issue-modal" class="modal-toggle" />
    <div class="modal" role="dialog">
        <div class="modal-box w-11/12 max-w-3xl p-0 rounded-3xl overflow-hidden shadow-2xl" id="modal-content">
            </div>
        <label class="modal-backdrop" for="issue-modal">Close</label>
    </div>

    <script src="script.js"></script>
</body>
</html>
